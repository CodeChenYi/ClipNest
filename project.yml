name: ClipNest
options:
  bundleIdPrefix: com.clipnest
  deploymentTarget:
    macOS: "12.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

packages:
  HotKey:
    url: https://github.com/soffes/HotKey
    from: "0.2.0"

settings:
  base:
    PRODUCT_NAME: ClipNest
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "12.0"
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGNING_REQUIRED: "NO"
    CODE_SIGN_ENTITLEMENTS: ""

targets:
  ClipNest:
    type: application
    platform: macOS
    sources:
      - path: Sources/ClipNest
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.clipnest.app
        GENERATE_INFOPLIST_FILE: "YES"
        INFOPLIST_KEY_CFBundleDisplayName: ClipNest
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.utilities"
        INFOPLIST_KEY_NSHumanReadableCopyright: "Copyright 2026 ClipNest"
        INFOPLIST_KEY_LSUIElement: "YES"
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
        ENABLE_HARDENED_RUNTIME: "YES"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        COMBINE_HIDPI_IMAGES: "YES"
    dependencies:
      - package: HotKey
    entitlements:
      path: Sources/ClipNest/Resources/ClipNest.entitlements
      properties:
        com.apple.security.app-sandbox: false
